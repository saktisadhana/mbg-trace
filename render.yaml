# Render Blueprint — Laravel API (Docker, free plan)
# Deploy: push to GitHub → Render dashboard → New + → Blueprint → pick this repo.
# Render reads this file and creates the service; fill the `sync: false`
# secrets when prompted (they never touch git).
services:
  - type: web
    name: mbg-trace-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: mysql
      - key: DB_DATABASE
        value: sppg_db
      - key: MONGODB_DATABASE
        value: mbg_nosql
      # Aiven MySQL requires TLS; cert is bundled at certs/aiven-ca.pem
      - key: MYSQL_ATTR_SSL_CA
        value: /var/www/html/certs/aiven-ca.pem
      - key: CORS_ALLOWED_ORIGINS
        value: https://saktisadhana.github.io,http://localhost:5173
      # ── Secrets: set these in the Render dashboard ──
      - key: APP_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MONGODB_URI
        sync: false
